################################################################################
# Legacy Jupyter Book 1 configuration.
#
# Jupyter Book 2 reads myst.yml for the site configuration and table of contents.
# This file is retained for compatibility with older local tooling only.
################################################################################

title: Pyomo Workshop
author: Ben Murray, David Bernal
logo: logo.png

# Normal Jupyter Book 2 builds render committed notebook outputs without
# executing notebooks. Keep legacy builds from forcing notebook re-execution.
execute:
  execute_notebooks: "off"

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Launch on Google Colab button
launch_buttons:
  notebook_interface: "classic"
  colab_url: "https://colab.research.google.com"

# Information about where the book exists on the web
repository:
  url: https://github.com/SECQUOIA/pyomo_jupyter_book  # Online location of your book
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  use_multitoc_numbering: true
